l_russian:
 VIC_organize_CGQJ: "Организовать Commissariat général aux questions juives"
 VIC_organize_CGQJ_desc: "Генеральный комиссариат по еврейским вопросам - административный орган, ответственный за организацию депортации и изъятия имущества"

 VIC_learn_ships_from_the_enemy: "Изучить иностранных флотских производителей"
 VIC_learn_ships_from_the_enemy_desc: "Мы предпримем попытки установить контакты с Итальянскими производителями через наших немецких посредников"
 VIC_learn_armor_from_the_enemy: "Изучить иностранных бронне производителей"
 VIC_learn_armor_from_the_enemy_desc: "Немецкие танки доказали свою эффективность в современной войне, мы попытаемся задобрить наших покровителей чтобы организовать свое производство танков" 
 VIC_learn_airforce_from_the_enemy: "Изучить иностранных авиа производителей"
 VIC_learn_airforce_from_the_enemy_desc: "После проведения модернизации авиации к нам пришло предложение от итальянских организаций начать производство в нашей стране"

 FRA_VIC_get_back: "Мы дома"
 FRA_VIC_get_back_desc: "После долгой борьбы нам удалось вернуться обратно домой в Париж. Начнем работу по восстановлению"
 FRA_VIC_ask_our_masters: "Просьба у наших господ"
 FRA_VIC_ask_our_masters_desc: "Мы попытаемся попросить экономическую независимость у наших покровителей"
 FRA_VIC_take_german_example: "Взять пример с немцев"
 FRA_VIC_take_german_example_desc: "Чтобы исправить несостоятельность нашей экономики, мы возьмем пример с немецкой экономики"

 FRA_VIC_atom_investing: "Инвестирование в атом"
 FRA_VIC_atom_investing_desc: "Возможно, атом - это единственное, в чем мы можем преуспеть"
 FRA_VIC_atom_research: "Изучить атом"
 FRA_VIC_atom_research_desc: "Нам нужно вложиться в изучение возможностей атома, может быть мы сможем использовать его"
 FRA_VIC_big_bomb: "Свободный атом"
 FRA_VIC_big_bomb_desc: "В нашей стране есть достаточное количество урана чтобы доказать всем состоятельность нашей государственности"

 FRA_VIC_start_build_autobahn: "Начать строительство автобана"
 FRA_VIC_start_build_autobahn_desc: "Возможно начав строительство подобия немецких автобанов наша экономика снова начнет процветать"
 FRA_VIC_build_autobahn_south: "Продолжить строительство на Юге"
 FRA_VIC_build_autobahn_south_desc: "Мы можем продлить автобан до границы с Италией, это укрепит наши дружеские отношения"
 FRA_VIC_build_autobahn_north: "Продолжить строительство на Севере"
 FRA_VIC_build_autobahn_north_desc: "Мы можем продлить автобан до границы с Германией"
 FRA_VIC_build_dam: "Построить Лионскую Плотину"
 FRA_VIC_build_dam_desc: "По окончанию строительства автобана наши инженеры увидели возможность построить крупную плотину на реке Рона"

 FRA_VIC_internal_enemies: "Враги внутри страны"
 FRA_VIC_internal_enemies_desc: "По возвращению территорий наш административный аппарат был расширен, нам требуется укрепить свою власть своего административного аппарата не позволив администрации продолжать раздуваться"

 FRA_VIC_german_trade: "Плата немцам"
 FRA_VIC_german_trade_desc: "Эта маленькая плата должна задобрить немцев за разрешение вернуть нашу администрацию обратно в Париж"
 FRA_VIC_german_colonists: "Немецкие колонисты"
 FRA_VIC_german_colonists_desc: "По плану немецкого правительство мы обязались принять у себя немецких колонистов в выделенной немцами зоне"
 FRA_VIC_CGQJ_job: "Новая директива"
 FRA_VIC_CGQJ_job_desc: "По возвращению организованный нами комиссариат получит новую директиву по поиску нежелательных элементов нашей страны, мы передадим эти элементы на милость наших господ, дальнейшая судьба нас будет мало волновать"
 FRA_VIC_destroy_opposition: "Реорганизовать парламент"
 FRA_VIC_destroy_opposition_desc: "Хоть парламент практически не имеет никакой власти в стране, однако мы должны ровняться на другие более процветающие государства и сделать небольшую \"реорганизацию\" нашего парламента"
 FRA_VIC_organized_nation: "Настоящее государство"
 FRA_VIC_organized_nation_desc: "Наконец-то после реставрации наших административных аппаратов и реорганизации общей государственной структуры мы можем называть себя полноценным государством"
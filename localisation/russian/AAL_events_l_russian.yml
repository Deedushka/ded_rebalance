l_russian:
 AAL_SOV.1: "Крах Красной Армии"
 AAL_SOV.1.t: "Крах Красной Армии"
 AAL_SOV.1.desc: "Наши вооруженные силы потерпели полное поражение от вооруженных сил Германии, и часть нашей армии сомневается в нашей компетентности"
 AAL_SOV.1.a: "Мы уничтожим их"
 AAL_SOV.2: "Неприятности"
 AAL_SOV.2.t: "Неприятности"
 AAL_SOV.2.desc: "Поскольку у нас не осталось портов, военно-морской флот только что отплыл в Америку!"
 AAL_SOV.2.a: "Мы можем сделать это и без них"
 AAL_SOV.3: "Суд военных"
 AAL_SOV.3.t: "Процесс над [?ROOT.GetCommunistLeader]"
 AAL_SOV.3.desc: "Судом установлено, что, изменив Родине и действуя в интересах немецкого капитала, подсудимый [?ROOT.GetCommunistLeader] сколотил враждебную нашему государству изменническую группу заговорщиков.\n\nСудебным следствием полностью подтвердились данные о том, что [?ROOT.GetCommunistLeader] совершил измену Родине, занимался шпионажем и на протяжении многих лет поддерживал тайные связи с немецкими разведками... Еще в 1919 году Берия, находясь в Баку, совершил предательство, поступив на секретно-агентскую должность в контрразведку мусаватистского правительства в Азербайджане, действовавшую под контролем немецких разведывательных органов\n\nПреступная группа заговорщиков совершала террористические расправы над людьми, со стороны которых они опасались разоблачений. Одним из основных методов своей деятельности заговорщики избрали клевету, интриги, провокации и фальсификации против честных партийных и советских работников\n\nСпециальный военный суд ПОСТАНОВИЛ:\nПриговорить [?ROOT.GetCommunistLeader] высшей мере уголовного наказания — расстрелу, с конфискацией лично им принадлежащего имущества, с лишением воинских званий и наград.\nПриговор является окончательным и кассационному обжалованию не подлежит"
 AAL_SOV.3.a: "Так тому и быть"

 AAL_JAP.1: "Победа"
 AAL_JAP.1.t: "Победа"
 AAL_JAP.1.desc: "Мы смогли одержать победу в этом конфликте".
 AAL_JAP.1.a: "Наконец-то"
 AAL_JAP.2: "Поражение"
 AAL_JAP.2.t: "Поражение"
 AAL_JAP.2.desc: "Мы потерпели поражение"
 AAL_JAP.2.a: "Позор"
 AAL_JAP.3: "Японская интервенция"
 AAL_JAP.3.t: "Японская интервенция"
 AAL_JAP.3.desc: "Япония начала пограничный конфликт с нашей страной"
 AAL_JAP.3.a: "К сожалению"
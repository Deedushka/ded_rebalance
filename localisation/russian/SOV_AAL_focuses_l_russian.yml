l_russian:
 SOV_increase_max_efficiency: "Повысить производственные нормы"
 SOV_increase_max_efficiency_desc: "Победа уже близка, мы должны повысить производственные нормы чтобы дожать немецкую погань"
 SOV_increase_industrial_capacity:  "Уменьшить рабочие перерывы"
 SOV_increase_industrial_capacity_desc:  "Мы уже близки к победе, снизим перерывы у рабочих, сделаем пример для стахановского движения"
 SOV_the_red_army_surrender_limit_not_zero_tt: "Лимит капитуляции в модификаторе §YКрасная Армия§! выше 0"

 SOV_AAL_stop_chaos: "Восстановить порядок"
 SOV_AAL_stop_chaos_desc: "Союз был уничтожен предателями. Наша первостепенная задача - вернуть порядок в то что осталось от этого \"Союза\""
 SOV_AAL_constitution_federation: "Конституция Федерации"
 SOV_AAL_constitution_federation_desc: "Подписание первой и единственной конституции нашей новой Федерации, где будут учитываться права всех граждан, вне зависимости от наших различий"
 SOV_AAL_antifa_ideology: "Идеология АнтиФа"
 SOV_AAL_antifa_ideology_desc: "Основная причина уничтожения нашей страны - нацисты, которые уничтожили нашу страну. Сделаем движение анти-фашизма как идеологию нашей страны "
 SOV_AAL_rights_limitation: "Ограничение прав"
 SOV_AAL_rights_limitation_desc: "Что бы добиться будущей победы в войне с нацистскими захватчиками мы должны ограничить некоторые свободы наших граждан, мы должны отдастся полностью ради победы над нацистской поганью"
 SOV_AAL_army_with: "Армия с..."
 SOV_AAL_army_with_desc: "Так как высший орган власти закрепился за военными, мы обязаны закрепить милитаризм в нашей стране"
 SOV_AAL_with_own_state: "...с своим государством"
 SOV_AAL_with_own_state_desc: "Каждый гражданин должен быть опорой для наших вооруженных сил, удвоенные или... УТРОЕННЫЕ производственные нормы должны стать базисом нашей страны"
 SOV_AAL_gulag_reform: "Реформа ГУЛАГа"
 SOV_AAL_gulag_reform_desc: "Скопления трудовых лагерей на территории Сибири позволит организовать возможность использовать труд лагерей для восстановления дорог по всей Федерации. А так же укрепить стабильность из-за только что освободившихся мест в трудовых лагерях"
 SOV_AAL_labor_discipline: "Ввести трудовую дисциплину"
 SOV_AAL_labor_discipline_desc: "Мы введем новые трудовые нормы для наших рабочих что бы догнать и перегнать по производству нациских мразей"
 SOV_AAL_geological_exploration: "Геологические исследования"
 SOV_AAL_geological_exploration_desc: "Наша Федерация требует больше ресурсов для будущей войны с нацистской мразью"
 SOV_AAL_mobilize_people: "Мобилизация нации"
 SOV_AAL_mobilize_people_desc: "Мы проведем небольшую мобилизацию наших граждан для будущего освобождения нашей Федерации"
 SOV_AAL_allow_privatization: "Разрешить приватизацию"
 SOV_AAL_allow_privatization_desc: "Так как мы уже провели демократические реформы, почему бы не провести новую экономическую политику?"
 SOV_AAL_allow_trading: "Допустить коммерцию"
 SOV_AAL_allow_trading_desc: "НЭП показала свою эффективность в свое время, нету причин как либо сдерживать людей от торговли"
 SOV_AAL_quick_urbanization: "Быстрая урбанизация"
 SOV_AAL_quick_urbanization_desc: "На нашей стороне осталось не так много городов, мы будем работать с тем что под нашим контролем"
 SOV_AAL_restore_constitutional_order: "Операция по восстановлению конституционного порядка"
 SOV_AAL_restore_constitutional_order_desc: "Все зауралье и сам Урал является частью нашей Федерации, те кто с этим несогласен - будет уничтожен"
 SOV_AAL_return_volga_region: "Вернуть Волжский регион"
 SOV_AAL_return_volga_region_desc: ""
 SOV_AAL_integrate_kirov: "Интеграция Кирова"
 SOV_AAL_integrate_kirov_desc: ""
 SOV_AAL_northern_negotiations: "Северные переговоры"
 SOV_AAL_northern_negotiations_desc: "Так как мы являемся единоличной силой на Урале, нет причин отказываться от предложения пряника более слабым соседям"
 SOV_AAL_help_patriarch: "Помочь патриарху"
 SOV_AAL_help_patriarch_desc: "Начнем возрождение православие в нашей стране. Так называемое «Второе крещение Руси»"
 SOV_AAL_integrate_tomsk: "Интеграция Томска"
 SOV_AAL_integrate_tomsk_desc: ""
 SOV_AAL_return_siberia_region: "Вернуть Сибирь"
 SOV_AAL_return_siberia_region_desc: ""
 SOV_AAL_annul_national_movements: "Аннулировать национальные движения"
 SOV_AAL_annul_national_movements_desc: ""
 SOV_AAL_finish_whites: "Закончить с белыми"
 SOV_AAL_finish_whites_desc: ""
 SOV_AAL_first_SEZ: "Специальная Экономическая Зона"
 SOV_AAL_first_SEZ_desc: "Введем новые зоны в которых будут налоговые льготы, а так же некоторые преференции для рабочих"
 SOV_AAL_amendment_to_constitution: "Поправки в конституцию"
 SOV_AAL_amendment_to_constitution_desc: "Казахстан и вся Центральная Азия всегда была частью России, закрепим это в конституции"
 SOV_AAL_new_russian: "Новый русский"
 SOV_AAL_new_russian_desc: "Каждый гражданин - считается русским. Каждый русский готов отдать свою жизнь ради нашей Федерации, в том числе и на производственном фронте"
 SOV_AAL_destroy_nazis: "Уничтожить логово нацизма"
 SOV_AAL_destroy_nazis_desc: "Пришло время уничтожить нацистскую мразь раз и навсегда. Мы подготовили нашу промышленность, а так же наших людей для окончание решение нацистского вопроса"
 anti_partisan.1.t: "§GОгромная победа§!"
 anti_partisan.1.d: "В ходе противостояния с УПА наше подразделение смогло уничтожить крупное формирование"
 anti_partisan.1.a: "Отлично"
 anti_partisan.2.t: "§GОграниченный успех§!"
 anti_partisan.2.d: "Нам удалось уничтожить небольшой отряд УПА"
 anti_partisan.2.a: "Лучше, чем ничего"
 anti_partisan.3.t: "§RЛегкое поражение§!"
 anti_partisan.3.d: "Во время рейда мы не смогли обнаружить ни одного подразделения УПА"
 anti_partisan.3.a: "К сожалению"
 anti_partisan.4.t: "§RТяжелое поражение§!"
 anti_partisan.4.d: "УПА устроила засаду и уничтожила наше подразделение"
 anti_partisan.4.a: "Ужасно"
 anti_partisan.5.t: "Уничтожение партизанской ячейки"
 anti_partisan.5.d: "Был проведен успешный рейд против УПА"
 anti_partisan.5.a: "Прекрасно"
 anti_partisan.6.t: "Уничтожение партизан в [state_target.GetName]"
 anti_partisan.6.d: "Мы наконец-то разгромили партизан УПА в [state_target.GetName]"
 anti_partisan.6.a: "Прекрасно"
l_russian:
 AAL_industrial_effort: "Развитие промышленности"
 AAL_industrial_effort_desc: "Все политические усилия следует сосредоточить на том, чтобы обеспечить развитие промышленности мирного назначения."
 AAL_construction_effort: "Развитие строительства"
 AAL_construction_effort_desc: "Не следует недооценивать гражданскую промышленность, даже когда надвигается мировая война."
 AAL_construction_effort_2: "Развитие строительства II"
 AAL_construction_effort_2_desc: "Мы должны усовершенствовать фабрики, чтобы ускорить производство товаров для торговли и обеспечить дальнейшее строительство."
 AAL_production_effort: "Развитие вооружений"
 AAL_production_effort_desc: "Кто умеет делать трактора, сумеет делать и танки! Мы не можем допустить отставания военной промышленности."
 AAL_production_effort_2: "Развитие вооружений II"
 AAL_production_effort_2_desc: "Не стоит пытаться переориентировать фабрики на выпуск военной продукции. Мы должны сосредоточиться на развитии военной промышленности как таковой."
 AAL_infrastructure_effort: "Развитие инфраструктуры"
 AAL_infrastructure_effort_desc: "Страна без соответствующей инфраструктуры не может заниматься продвинутыми исследованиями и строительством."
 AAL_production_effort_3: "Развитие вооружений III"
 AAL_production_effort_3_desc: "Необходимо и дальше совершенствовать военные заводы для производства самой современной военной техники."
 AAL_infrastructure_effort_2: "Развитие инфраструктуры II"
 AAL_infrastructure_effort_2_desc: "Необходимо расширять инфраструктуру, развивая транспорт и средства связи для работы над высокотехнологичными секретными проектами."
 AAL_construction_effort_3: "Развитие строительства III"
 AAL_construction_effort_3_desc: "Расширение нашей инфраструктуры открыло для нас новые возможности в строительной сфере."
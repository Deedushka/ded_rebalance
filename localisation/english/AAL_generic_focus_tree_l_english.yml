l_english:
 AAL_industrial_effort: "Industrial Effort"
 AAL_industrial_effort_desc: "Focus all our political efforts on building up the civilian industry in a great leap forward."
 AAL_construction_effort: "Construction Effort"
 AAL_construction_effort_desc: "Civilian industrial capacity must not be underestimated even when war looms over the world."
 AAL_ construction_effort_2: "Construction Effort II"
 AAL_construction_effort_2_desc: "Continuing to expand our factories will allow us to speed up production of goods for trade and further construction efforts."
 AAL_production_effort: "Armament Effort"
 AAL_production_effort_desc: "If you can build tractors, you can build tanks! We must not allow our military production capacity to lag behind."
 AAL_production_effort_2: "Armament Effort II"
 AAL_production_effort_2_desc: "Trying to adapt civilian factories to produce military equipment is inefficient. We should focus on preparing military production now."
 AAL_infrastructure_effort: "Infrastructure Effort"
 AAL_infrastructure_effort_desc: "A country without proper infrastructure cannot pursue advanced projects or constructions."
 AAL_production_effort_3: "Armament Effort III"
 AAL_production_effort_3_desc: "Continued efforts to expand our military factories are necessary to meet the demands for new equipment."
 AAL_infrastructure_effort_2: "Infrastructure Effort II"
 AAL_infrastructure_effort_2_desc: "Extending our infrastructure further will enable the transports and communications necessary for high-tech clandestine projects."
 AAL_construction_effort_3: "Construction Effort III"
 AAL_construction_effort_3_desc: "Expansion of our infrastructure network has significantly improved our capacity for construction."
l_english:
 SOV_increase_max_efficiency: "Increase production rates"
 SOV_increase_max_efficiency_desc: "Victory is near, we must increase production rates to finish off the German scum."
 SOV_increase_industrial_capacity: "Reduce worker breaks"
 SOV_increase_industrial_capacity_desc: "We are close to victory, we will reduce workers' breaks, set an example for the Stakhanovite movement."
 SOV_the_red_army_surrender_limit_not_zero_tt: "The surrender limit in the §YRed Army§! modifier is above 0."

 SOV_AAL_stop_chaos: "Restore order"
 SOV_AAL_stop_chaos_desc: "The Union was destroyed by traitors. Our primary task is to restore order to what remains of this 'Union'."
 SOV_AAL_constitution_federation: "Constitution of the Federation"
 SOV_AAL_constitution_federation_desc: "The signing of the first and only constitution of our new Federation, which will take into account the rights of all citizens, regardless of our differences."
 SOV_AAL_antifa_ideology: "Antifa Ideology"
 SOV_AAL_antifa_ideology_desc: "The main reason for the destruction of our country is the Nazis, who destroyed our country. Let's make the anti-fascist movement the ideology of our country."
 SOV_AAL_rights_limitation: "Restriction of Rights"
 SOV_AAL_rights_limitation_desc: "To achieve For future victory in the war against the Nazi invaders, we must limit some of our citizens' freedoms. We must devote ourselves entirely to the cause of victory over the Nazi scum."
 SOV_AAL_army_with: "Army with..."
 SOV_AAL_army_with_desc: "Since the highest authority has been entrenched in the military, we are obliged to consolidate militarism in our country."
 SOV_AAL_with_own_state: "...with our own state."
 SOV_AAL_with_own_state_desc: "Every citizen must be the support of our armed forces. Doubled or... TRIPLE production quotas must become the foundation of our country."
 SOV_AAL_gulag_reform: "GULAG Reform"
 SOV_AAL_gulag_reform_desc: "The clustering of labor camps in Siberia will make it possible to use the labor of the camps to restore roads throughout the Federation. It will also strengthen stability due to the newly vacated spaces in labor camps"
 SOV_AAL_labor_discipline: "Implement labor discipline"
 SOV_AAL_labor_discipline_desc: "We will introduce new labor standards for our workers to catch up and surpass the Nazi scum in production."
 SOV_AAL_geological_exploration: "Geological exploration"
 SOV_AAL_geological_exploration_desc: "Our Federation requires more resources for the future war against the Nazi scum."
 SOV_AAL_mobilize_people: "Mobilize the nation"
 SOV_AAL_mobilize_people_desc: "We will conduct a small mobilization of our citizens for the future liberation of our Federation."
 SOV_AAL_allow_privatization: "Allow privatization"
 SOV_AAL_allow_privatization_desc: "Since we have already carried out democratic reforms, why not implement a new economic policy?"
 SOV_AAL_allow_trading: "Allow Commerce"
 SOV_AAL_allow_trading_desc: "The New Economic Policy (NEP) proved its effectiveness in its time; there is no reason to restrain people from trading."
 SOV_AAL_quick_urbanization: "Rapid Urbanization"
 SOV_AAL_quick_urbanization_desc: "There aren't many cities left on our side; we will work with what we have."
 SOV_AAL_restore_constitutional_order: "Operation to Restore Constitutional Order"
 SOV_AAL_restore_constitutional_order_desc: "All of the Trans-Urals region and the Urals itself are part of our Federation; those who disagree with this will be destroyed."
 SOV_AAL_return_volga_region: "Return the Volga Region"
 SOV_AAL_return_volga_region_desc: ""
 SOV_AAL_integrate_kirov: "Kirov Integration"
 SOV_AAL_integrate_kirov_desc: ""
 SOV_AAL_northern_negotiations: "Northern Negotiations"
 SOV_AAL_northern_negotiations_desc: "Since we are the sole power in the Urals, there is no reason to refuse the offer of a carrot to our weaker neighbors."
 SOV_AAL_help_patriarch: "Help the Patriarch"
 SOV_AAL_help_patriarch_desc: "Let's begin the revival of Orthodoxy in our country. The so-called 'Second Baptism of Rus'."
 SOV_AAL_integrate_tomsk: "Tomsk Integration"
 SOV_AAL_integrate_tomsk_desc: ""
 SOV_AAL_return_siberia_region: "Return Siberia"
 SOV_AAL_return_siberia_region_desc: ""
 SOV_AAL_annul_national_movements: "Annul national movements"
 SOV_AAL_annul_national_movements_desc: ""
 SOV_AAL_finish_whites: "Finish with the whites"
 SOV_AAL_finish_whites_desc: ""
 SOV_AAL_first_SEZ: "Special Economic Zone"
 SOV_AAL_first_SEZ_desc: "We will introduce new zones with tax breaks, as well as some preferences for workers"
 SOV_AAL_amendment_to_constitution: "Amendments to the constitution"
 SOV_AAL_amendment_to_constitution_desc: "Kazakhstan and all of Central Asia have always been part of Russia; let's enshrine this in the constitution"
 SOV_AAL_new_russian: "New Russian"
 SOV_AAL_new_russian_desc: "Every citizen is considered Russian. Every Russian is ready to give their life for our Federation, including on the production front."
 SOV_AAL_destroy_nazis: "Destroy the lair of Nazism."
 SOV_AAL_destroy_nazis_desc: "The time has come to destroy the Nazi scum once and for all. We have prepared our industry, as well as our people, to complete the solution to the Nazi question."
l_english:
 VIC_organize_CGQJ: "Organize Commissariat général aux questions juives"
 VIC_organize_CGQJ_desc: "The General Commissariat for Jewish Affairs is the administrative body responsible for organizing deportations and seizures of property"

 VIC_learn_ships_from_the_enemy: "Learn foreign naval organizations"
 VIC_learn_ships_from_the_enemy_desc: "We will try to establish contacts with Italian manufacturers through our German intermediaries."
 VIC_learn_armor_from_the_enemy: "Learn foreign armor organizations"
 VIC_learn_armor_from_the_enemy_desc: "German tanks have proven their effectiveness in modern warfare, we will try to appease our patrons in order to organize our own tank production." 
 VIC_learn_airforce_from_the_enemy: "Learn foreign aircraft organizations"
 VIC_learn_airforce_from_the_enemy_desc: "After the modernization of aviation, we received an offer from Italian organizations to start production in our country"

 FRA_VIC_get_back: "We at home"
 FRA_VIC_get_back_desc: "After a long struggle, we managed to get back home to Paris. Let's start the restoration work"
 FRA_VIC_ask_our_masters: "A request to our masters"
 FRA_VIC_ask_our_masters_desc: "We will try to ask for economic independence from our masters"
 FRA_VIC_take_german_example: "Take an example from Germans"
 FRA_VIC_take_german_example_desc: "To correct the failure of our economy, we will take an example from the German economy"

 FRA_VIC_atom_investing: "Investing in the atom"
 FRA_VIC_atom_investing_desc: "Maybe the atom is the only thing we can succeed at"
 FRA_VIC_atom_research: "Research the Atom"
 FRA_VIC_atom_research_desc: "We need to invest in exploring the possibilities of the atom, maybe we can use it"
 FRA_VIC_big_bomb: "A free atom"
 FRA_VIC_big_bomb_desc: "There is enough uranium in our country to prove to everyone the viability of our statehood"

 FRA_VIC_start_build_autobahn: "Start building an autobahn"
 FRA_VIC_start_build_autobahn_desc: "Perhaps by starting the construction similarity of German autobahns, our economy will begin to flourish again"
 FRA_VIC_build_autobahn_south: "Continue construction in the South"
 FRA_VIC_build_autobahn_south_desc: "We can extend the autobahn to the Italian border, this will strengthen our friendly relations"
 FRA_VIC_build_autobahn_north: "Continue construction in the North"
 FRA_VIC_build_autobahn_north_desc: "We can extend the autobahn to the German border"
 FRA_VIC_build_dam: "To Build the Lyon Dam"
 FRA_VIC_build_dam_desc: "After the completion of the autobahn, our engineers saw an opportunity to build a large dam on the Rhone River"

 FRA_VIC_internal_enemies: "Enemies inside the country"
 FRA_VIC_internal_enemies_desc: "After the return of the territories, our administrative apparatus was expanded, we need to strengthen our power of our administrative apparatus without allowing the administration to continue to inflate"

 FRA_VIC_german_trade: "Payment to the Germans"
 FRA_VIC_german_trade_desc: "This small payment should appease the Germans for permission to bring our administration back to Paris."
 FRA_VIC_german_colonists: "The German colonists"
 FRA_VIC_german_colonists_desc: "According to the plan of the German government, we have committed ourselves to host German colonists in the zone designated by the Germans"
 FRA_VIC_CGQJ_job: "New Directive"
 FRA_VIC_CGQJ_job_desc: "Upon our return, the commissariat we have organized will receive a new directive to search for undesirable elements of our country, we will hand these elements over to the mercy of our masters, and we will not care much about the future."
 FRA_VIC_destroy_opposition: "Reorganize the Parliament"
 FRA_VIC_destroy_opposition_desc: "Although the parliament has practically no power in the country, however, we must look up to other more prosperous states and make a small \"reorganization\" of our parliament"
 FRA_VIC_organized_nation: "Real Nation"
 FRA_VIC_organized_nation_desc: "Finally, after the restoration of our administrative offices and the reorganization of the overall state structure, we can call ourselves a full-fledged state"
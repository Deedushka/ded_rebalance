l_english:
 AAL_SOV.1: "The collapse of the Red Army"
 AAL_SOV.1.t: "The collapse of the Red Army"
 AAL_SOV.1.desc: "Our armed forces have been completely defeated by the German armed forces, and part of our army doubts our competence"
 AAL_SOV.1.a: "We will destroy them"
 AAL_SOV.2: "Trouble"
 AAL_SOV.2.t: "Trouble"
 AAL_SOV.2.desc: "Since we have no ports left, the Navy just sailed to America!"
 AAL_SOV.2.a: "We can do it without them"
 AAL_SOV.3: "The Special Military Court"
 AAL_SOV.3.t: "The trial of [?ROOT.GetCommunistLeader]"
 AAL_SOV.3.desc: "The court has established that, having betrayed the Motherland and acting in the interests of German capital, the defendant [?ROOT.GetCommunistLeader] formed a treasonous group of conspirators hostile to our state.\n\nThe judicial investigation has fully confirmed the data that [?ROOT.GetCommunistLeader] committed treason against the Motherland, engaged in espionage, and maintained secret ties with German intelligence agencies for many years... Back in 1919, while in Baku, Beria committed an act of betrayal by taking a secret agent position in the counterintelligence of the Musavat government in Azerbaijan, which operated under the control of German intelligence agencies.\n\nThe criminal group of conspirators carried out terrorist reprisals against people from whom they feared exposure. As one of the main methods of their activity, the conspirators chose slander, intrigue, provocations, and falsifications against honest party and Soviet workers.\n\nThe Special Military Court has DECIDED:\nTo sentence [?ROOT.GetCommunistLeader] to the highest measure of criminal punishment — execution by firing squad, with the confiscation of all property personally belonging to him, and with the deprivation of military ranks and awards.\nThe verdict is final and is not subject to cassation appeal."
 AAL_SOV.3.a: "So be it"
 AAL_SOV.4: "Russian ultimatum to [?THIS.GetName]"
 AAL_SOV.4.t: "Russian ultimatum to [?THIS.GetName]"

 AAL_JAP.1: "Victory"
 AAL_JAP.1.t: "Victory"
 AAL_JAP.1.desc: "We were able to win the conflict."
 AAL_JAP.1.a: "Finally"
 AAL_JAP.2: "Defeat"
 AAL_JAP.2.t: "Defeat"
 AAL_JAP.2.desc: "We were defeated"
 AAL_JAP.2.a: "Shame"
 AAL_JAP.3: "The Japanese intervention"
 AAL_JAP.3.t: "The Japanese intervention"
 AAL_JAP.3.desc: "Japan has started a border conflict with our country"
 AAL_JAP.3.a: "Sadly"


l_english:
 anti_partisan_decision_categories: "Destroy partisan movements"
 low_partisan_strength: "Destroy partisans in [?FROM.GetName]"
 low_partisan_strength_desc: "We can use the surrendered as a labor force to strengthen our nation"

 anti_partisan.1.t: "§GHuge victory§!"
 anti_partisan.1.d: "During the confrontation with the UPA, our unit was able to destroy a large formation"
 anti_partisan.1.a: "Great"
 anti_partisan.2.t: "§GLimited success§!"
 anti_partisan.2.d: "We managed to destroy a small UPA partisan unit"
 anti_partisan.2.a: "Better than nothing"
 anti_partisan.3.t: "§RMinor defeat§!"
 anti_partisan.3.d: "We couldn't find any UPA units during the raid"
 anti_partisan.3.a: "Sadly"
 anti_partisan.4.t: "§RSevere defeat§!"
 anti_partisan.4.d: "The UPA ambushed and destroyed our unit"
 anti_partisan.4.a: "Terribly"
 anti_partisan.5.t: "Destroyed a partisan cell"
 anti_partisan.5.d: "A successful raid against the UPA was carried out"
 anti_partisan.5.a: "Excellent"
 anti_partisan.6.t: "Destroyed partisans in [state_target.GetName]"
 anti_partisan.6.d: "We finally routed the UPA partisans in [state_target.GetName]"
 anti_partisan.6.a: "Excellent"